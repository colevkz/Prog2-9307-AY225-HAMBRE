<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #ffa8c5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.4), transparent);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.3), transparent);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-20px) translateX(20px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(196, 69, 105, 0.4);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b9d, #ffa8c5, #ff69b4, #ff1493);
            border-radius: 20px;
            z-index: -1;
            opacity: 0.5;
            filter: blur(10px);
        }

        h1 {
            color: #c44569;
            margin-bottom: 10px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(196, 69, 105, 0.1);
            position: relative;
        }

        h1::after {
            content: '笨ｦ';
            position: absolute;
            right: -30px;
            top: 0;
            color: #ff6b9d;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            color: #c44569;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #ffc0cb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: linear-gradient(to right, #fff 0%, #fff5f7 100%);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.1);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff1493 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        .error-message {
            background: linear-gradient(135deg, #ffe5e5 0%, #ffd1d1 100%);
            color: #d32f2f;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #f44336;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.1);
        }

        .success-section {
            display: none;
        }

        .welcome-box {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #f06292;
            box-shadow: 0 8px 20px rgba(240, 98, 146, 0.2);
            position: relative;
            overflow: hidden;
        }

        .welcome-box::before {
            content: '減';
            position: absolute;
            font-size: 80px;
            opacity: 0.1;
            right: -10px;
            top: -10px;
        }

        .welcome-box h2 {
            color: #c2185b;
            margin-bottom: 10px;
            font-size: 24px;
            position: relative;
        }

        .timestamp {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .attendance-table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(196, 69, 105, 0.1);
        }

        .attendance-table th,
        .attendance-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #ffc0cb;
        }

        .attendance-table th {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fb3 100%);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .attendance-table tr:hover {
            background: #fff5f7;
            transition: background 0.3s ease;
        }

        .attendance-table tr:last-child td {
            border-bottom: none;
        }

        .download-btn {
            background: linear-gradient(135deg, #f06292 0%, #ec407a 100%);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #ec407a 0%, #e91e63 100%);
        }

        .logout-btn {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
        }

        h3 {
            color: #c44569;
            position: relative;
            padding-left: 15px;
        }

        h3::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 20px;
            background: linear-gradient(180deg, #ff6b9d 0%, #f06292 100%);
            border-radius: 3px;
        }

        /* Decorative elements */
        .dots {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 182, 193, 0.4);
            border-radius: 50%;
            animation: float-dot 10s infinite;
        }

        .dot:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .dot:nth-child(2) { top: 60%; left: 80%; animation-delay: 2s; }
        .dot:nth-child(3) { top: 40%; left: 40%; animation-delay: 4s; }
        .dot:nth-child(4) { top: 80%; left: 10%; animation-delay: 1s; }
        .dot:nth-child(5) { top: 20%; left: 70%; animation-delay: 3s; }

        @keyframes float-dot {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.4; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="container">
        <div id="loginSection">
            <h1>Attendance System</h1>
            <p class="subtitle">Please log in to record your attendance</p>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit">Log In</button>
            </form>
        </div>

        <div id="successSection" class="success-section">
            <div class="welcome-box">
                <h2>Welcome, <span id="displayUsername"></span>!</h2>
                <p class="timestamp">Login Time: <span id="displayTimestamp"></span></p>
            </div>

            <h3 style="margin-bottom: 15px;">Attendance Records</h3>
            <table class="attendance-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Login Time</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                </tbody>
            </table>

            <button class="download-btn" onclick="downloadAttendance()">Download Attendance Summary</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const validCredentials = {
            username: 'student',
            password: 'password123'
        };

        let attendanceRecords = [];

        function playBeep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function formatDateTime(date) {
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            return `${month}/${day}/${year} ${hours}:${minutes}:${seconds}`;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (username === validCredentials.username && password === validCredentials.password) {
                const timestamp = formatDateTime(new Date());

                attendanceRecords.push({
                    username: username,
                    timestamp: timestamp
                });

                document.getElementById('displayUsername').textContent = username;
                document.getElementById('displayTimestamp').textContent = timestamp;

                updateAttendanceTable();

                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';

                document.getElementById('loginForm').reset();
                errorMessage.style.display = 'none';
            } else {
                playBeep();
                errorMessage.textContent = 'Invalid username or password. Please try again.';
                errorMessage.style.display = 'block';

                errorMessage.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    errorMessage.style.animation = '';
                }, 500);
            }
        });

        function updateAttendanceTable() {
            const tbody = document.getElementById('attendanceTableBody');
            tbody.innerHTML = '';

            attendanceRecords.forEach(record => {
                const row = tbody.insertRow();
                const cell1 = row.insertCell(0);
                const cell2 = row.insertCell(1);

                cell1.textContent = record.username;
                cell2.textContent = record.timestamp;
            });
        }

        function downloadAttendance() {
            let attendanceData = 'ATTENDANCE SUMMARY\n';
            attendanceData += '='.repeat(50) + '\n\n';

            attendanceRecords.forEach((record, index) => {
                attendanceData += `Record ${index + 1}:\n`;
                attendanceData += `Username: ${record.username}\n`;
                attendanceData += `Timestamp: ${record.timestamp}\n`;
                attendanceData += '-'.repeat(50) + '\n\n';
            });

            attendanceData += `Total Records: ${attendanceRecords.length}\n`;
            attendanceData += `Generated on: ${formatDateTime(new Date())}\n`;

            const blob = new Blob([attendanceData], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = 'attendance_summary.txt';
            link.click();
        }

        function logout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('successSection').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
                20%, 40%, 60%, 80% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
